<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>以撒代码压缩器 - LuaMin</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<style>
@font-face{font-family:'IsaacCode';src:url('../assets/inconsolata-bold.ttf') format('truetype');font-display:swap}
@font-face{font-family:'IsaacPixel';src:url('../assets/isaac-pixel-subset.woff2') format('woff2');font-display:swap}
:root{--cream:#eadbc4;--muted:#a68f79;--panel:#17110f;--panel2:#211713;--line:#644237;--blood:#84253a;--ok:#6e9c70;--err:#b44752;--display:'IsaacPixel','Microsoft YaHei UI','Microsoft YaHei',sans-serif;--hud:'IsaacCode',Consolas,monospace;--mono:'IsaacCode','Cascadia Code',Consolas,monospace;--sans:'IsaacPixel','Microsoft YaHei UI','Microsoft YaHei',sans-serif}
*{box-sizing:border-box}html{min-height:100%;background:#160a07}body{min-height:100%;margin:0;padding:22px 18px 52px;color:var(--cream);font-family:var(--sans);background:#4b281f url('../assets/basement-room.webp') center center/cover scroll no-repeat;-webkit-font-smoothing:none}body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse at 50% 35%,transparent 28%,rgba(15,5,3,.25) 76%),linear-gradient(rgba(18,6,4,.04),rgba(18,6,4,.3))}@keyframes appear{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.wrap{position:relative;z-index:1;max-width:1160px;margin:auto;animation:appear .22s ease-out}
.home-btn{position:absolute;z-index:4;left:0;top:8px;min-height:46px;padding:8px 18px;border:12px solid transparent;border-image:url('../assets/basement-panel.webp') 112 fill stretch;color:#d9c6aa;background:#1b1210;text-decoration:none;font:400 .9rem/1.2 var(--display);transition:.1s}.home-btn:hover{color:#fff0d3;transform:translateY(-1px)}
.tool-hero{text-align:center;margin:0 auto 24px}.game-logo{display:block;width:min(320px,65vw);height:auto;margin:0 auto 1px;filter:drop-shadow(0 11px 4px rgba(0,0,0,.66))}.tool-heading{max-width:700px;margin:auto;text-shadow:0 3px 2px #140806}h1{margin:8px 0 5px;color:#f0dfc7;font:400 clamp(1.9rem,4.5vw,3rem)/1.1 var(--display);letter-spacing:.035em}.sub{color:#c4af93;font:400 .96rem/1.4 var(--display)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{position:relative;min-height:535px;padding:22px 24px 25px;border:32px solid transparent;border-image:url('../assets/basement-panel.webp') 112 fill stretch;color:#dcc9ad;background:#1a1210;box-shadow:0 10px 20px rgba(0,0,0,.34)}.card h2{margin:0 0 8px;padding-bottom:7px;border-bottom:1px solid #644237;color:#e6d4b7;font:400 1rem/1.4 var(--display)}.stat{display:block;min-height:18px;margin-bottom:5px;color:#99816f;font:700 .78rem/1.2 var(--hud)}textarea{width:100%;height:330px;margin-top:10px;padding:12px;border:2px solid #5f4035;resize:none;overflow-y:auto;overflow-x:hidden;outline:0;color:#d9cab1;background:#100b09;box-shadow:inset 0 0 24px rgba(0,0,0,.38);font:13px/1.6 var(--mono);white-space:pre-wrap}textarea::placeholder{color:#76675d}textarea:focus{border-color:#985062;box-shadow:inset 0 0 24px rgba(0,0,0,.38),0 0 0 2px rgba(132,37,58,.28)}#out{word-break:break-all}
.row{display:flex;align-items:center;flex-wrap:wrap;gap:9px;margin-top:9px}button{min-height:40px;padding:7px 16px;border:2px solid #70483c;color:#d8c4a6;background:#261713;cursor:url('../assets/menu-cursor.png') 5 1,pointer;font:400 .86rem/1.25 var(--display);transition:.1s}.primary{border-color:#8a4050;color:#efd4b6;background:#32161d}.ghost{border-style:dashed;color:#ae9680}button::before{content:'>';margin-right:7px;color:#a64858;opacity:.55}button:hover::before{opacity:1}button:hover{color:#fff0d2;border-color:#9a5360;background:#331a20;transform:translateY(-1px)}button:active{transform:translateY(1px)}button:disabled{opacity:.45}.search-toggle{display:inline-flex;align-items:center;gap:6px;color:#a38c78;cursor:url('../assets/menu-cursor.png') 5 1,pointer;font:400 .8rem/1.2 var(--display);user-select:none}.search-toggle input{width:15px;height:15px;accent-color:var(--blood)}
#progress{display:none;max-width:900px;margin:14px auto;padding:16px 20px;border:24px solid transparent;border-image:url('../assets/basement-panel.webp') 112 fill stretch;background:#1a1210;box-shadow:0 8px 16px rgba(0,0,0,.3)}#progress.active{display:block}#progress .label{margin-bottom:6px;color:#aa927c;font:700 12px/1.2 var(--hud)}#progress .track{height:17px;overflow:hidden;border:2px solid #5e4035;background:#100b09}#progress .bar{height:100%;width:0;color:#eadbc4;background:#84253a;font:700 11px/13px var(--hud);text-align:center;white-space:nowrap;transition:width .15s}
.badge{display:inline-block;padding:1px 7px;color:#eee1d4;background:#84253a;font:700 .78rem/1.2 var(--hud)}.badge.ok{background:#557d59}.badge.err{background:#a83d49}#msg{display:none;max-width:900px;margin:14px auto 0;padding:15px 20px;border:22px solid transparent;border-image:url('../assets/basement-panel.webp') 112 fill stretch;color:#d8c5aa;background:#1a1210;font:12px/1.6 var(--mono);white-space:pre-wrap}#msg.ok,#msg.err{display:block}#msg.ok{color:#91bd92}#msg.err{color:#df8b91}
#stagesCard{min-height:0!important;max-width:960px;margin:18px auto 0!important;padding:22px 24px 25px!important}.diff-legend{margin-bottom:7px;color:#9e8876;font:11px/1.4 var(--hud)}#stages{display:flex;flex-direction:column;gap:8px;margin-top:10px}.stage-item{padding:8px 11px;border:1px solid #5b3d33;color:#d6c7ad;background:#100b09;font:12px/1.4 var(--mono);transition:.1s}.stage-item:hover{border-color:#85564a;background:#18100d}.stage-item.expandable{cursor:url('../assets/menu-cursor.png') 5 1,pointer}.stage-header{display:flex;align-items:center;justify-content:space-between;gap:8px}.stage-name{color:#dec07b;font-weight:700}.stage-len,.stage-expand{color:#8d796c;font-family:var(--hud)}.stage-delta{margin-left:8px;font-family:var(--hud)}.stage-delta.positive{color:#8bc28e}.stage-delta.negative{color:#dc7a80}.stage-code{display:none;max-height:240px;margin-top:8px;padding:8px;overflow-y:auto;border:1px solid #4c3027;background:#090605;color:#bca98f;font-size:11px;line-height:1.5;white-space:pre-wrap;word-break:break-all}.stage-item.expanded .stage-code{display:block}.stage-item.expanded .stage-expand::before{content:'▼ '}.stage-item:not(.expanded) .stage-expand::before{content:'▶ '}.stage-code ins,.diff-legend ins{color:#a9d4aa;background:rgba(73,135,78,.24);text-decoration:none}.stage-code del,.diff-legend del{color:#e39a9f;background:rgba(140,32,47,.22);text-decoration:line-through}.diff-toggle{margin-left:8px;padding:0 6px;border:1px solid #70514b;color:#a89485;cursor:pointer;font:10px/1.5 var(--hud);user-select:none}.diff-toggle:hover,.diff-toggle.active{color:#dfc37f;border-color:#ad8648}footer{margin-top:18px;color:#9e8876;text-align:center;font:700 .75rem/1.2 var(--hud)}code{padding:1px 5px;color:#e1c47c;background:#100b09;font-family:var(--mono)}
button:focus-visible,textarea:focus-visible,.home-btn:focus-visible,.search-toggle:focus-within{outline:2px solid #a95765;outline-offset:3px}::-webkit-scrollbar{width:11px;height:11px}::-webkit-scrollbar-track{background:#100b09}::-webkit-scrollbar-thumb{border:3px solid #100b09;background:#765346}
@media(max-width:850px){body{padding:15px 8px 40px;background-attachment:scroll}.wrap{padding:0 3px}.home-btn{position:relative;left:auto;top:auto;display:block;width:max-content;margin:0 auto 4px}.grid{grid-template-columns:1fr}.card{min-height:500px}}
@media(max-width:520px){.game-logo{width:min(285px,74vw)}h1{font-size:1.8rem}.card{min-height:470px;padding:16px 10px 20px;border-width:22px}.row{align-items:stretch}.row button{flex:1}textarea{height:290px}.stage-header{align-items:flex-start;flex-direction:column}#progress,#msg{border-width:18px;padding:12px}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important}}
</style>
</head>
<body>
<div class="wrap">
  <a href="../index.html" class="home-btn">返回主页</a>
  <header class="tool-hero">
    <img class="game-logo" src="../assets/repentance-logo.png" alt="The Binding of Isaac: Repentance+">
    <div class="tool-heading"><h1>以撒代码压缩器</h1><div class="sub">将代码压缩成一行并验证语法</div></div>
  </header>

  <div class="grid">
    <div class="card">
      <h2>输入（可含 <code>l</code>/<code>lua</code> 前缀、多行、注释）</h2>
      <span class="stat" id="inStat"></span>
      <div class="row">
        <button class="primary" id="run">压缩</button>
        <label class="search-toggle" title="启用搜索层：在规则系统输出之上尝试额外优化（canonical 验证兜底，可能更慢）"><input type="checkbox" id="useSearch"> 搜索优化</label>
        <button class="ghost" id="clear">清空</button>
      </div>
      <textarea id="in" spellcheck="false" placeholder="把正常格式的 Lua 代码贴进来，可带 l / lua 控制台前缀、换行、缩进与注释。&#10;整个输入会被当作【一段】代码压进一行。"></textarea>
    </div>

    <div class="card">
      <h2>输出 <span id="badge"></span></h2>
      <span class="stat" id="outStat"></span>
      <div class="row">
        <button class="primary" id="copy">复制结果</button>
      </div>
      <textarea id="out" readonly spellcheck="false"></textarea>
    </div>
  </div>

  <div id="msg"></div>

  <div id="progress"><div class="label"></div><div class="track"><div class="bar"></div></div></div>

  <div class="card" id="stagesCard" style="display:none;margin-top:16px;">
    <h2>压缩阶段</h2>
    <div class="diff-legend"><del>删除</del> <ins>新增</ins> ——点击阶段展开，可切换「diff / 完整代码」</div>
    <div id="stages"></div>
  </div>

  <footer></footer>
</div>

<script src="luaparse.js"></script>
<script src="fengari-web.js"></script>
<!-- LuaMin 核心：先加载各 src/ 模块（自注册到 window.__LuaMinParts），再加载 core.js 工厂 -->
<script src="src/analyze.js"></script>
<script src="src/plan.js"></script>
<script src="src/encode.js"></script>
<script src="src/canonical.js"></script>
<script src="src/folds.js"></script>
<script src="src/compress.js"></script>
<script src="src/search.js"></script>
<script src="core.js"></script>
<script>
(function(){
  var lp = window.luaparse;
  var fg = window.fengari || null;   // fengari-web 暴露的真·Lua 5.3 VM（权威语法校验）
  var engine = window.LuaMin.create(lp, fg);

  var $in=document.getElementById('in'), $out=document.getElementById('out');
  var $msg=document.getElementById('msg'), $badge=document.getElementById('badge');
  var $inStat=document.getElementById('inStat'), $outStat=document.getElementById('outStat');
  var $stagesCard=document.getElementById('stagesCard'), $stages=document.getElementById('stages');
  var $progress=document.getElementById('progress'), $useSearch=document.getElementById('useSearch');

  function setMsg(kind, text){ $msg.className=kind; $msg.textContent=text; }
  function clearMsg(){ $msg.className=''; $msg.textContent=''; }

  var $runBtn=document.getElementById('run'), $clearBtn=document.getElementById('clear');
  var running = false;
  function setRunning(v){
    running = v;
    $runBtn.disabled = v;
    $clearBtn.disabled = v;
    $useSearch.disabled = v;
  }

  // ---- 轻量 diff（token 级 LCS）：展示某阶段相对上一阶段的增删 ----
  function escapeHtml(s){
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  // 把代码切成 diff 友好的 token：标识符/数字整体、其它字符逐个，空白单独成段。
  function tokenizeForDiff(s){
    var toks=[], i=0, n=s.length;
    while(i<n){
      var c=s[i];
      if(/[A-Za-z0-9_]/.test(c)){
        var j=i+1; while(j<n && /[A-Za-z0-9_]/.test(s[j])) j++;
        toks.push(s.slice(i,j)); i=j;
      }else if(/\s/.test(c)){
        var k=i+1; while(k<n && /\s/.test(s[k])) k++;
        toks.push(s.slice(i,k)); i=k;
      }else{
        toks.push(c); i++;
      }
    }
    return toks;
  }
  // 标准 LCS diff，返回 [{t:'=', s}|{t:'+', s}|{t:'-', s}]，相邻同类合并。
  function diffTokens(aToks, bToks){
    var n=aToks.length, m=bToks.length;
    // LCS 长度表（防御：超大输入时退化为整体替换，避免卡顿）
    if(n*m > 4000000){
      var ops0=[];
      if(aToks.length) ops0.push({t:'-', s:aToks.join('')});
      if(bToks.length) ops0.push({t:'+', s:bToks.join('')});
      return ops0;
    }
    var dp=[]; for(var x=0;x<=n;x++){ dp.push(new Uint32Array(m+1)); }
    for(var i=n-1;i>=0;i--){
      for(var j=m-1;j>=0;j--){
        dp[i][j] = aToks[i]===bToks[j] ? dp[i+1][j+1]+1 : Math.max(dp[i+1][j], dp[i][j+1]);
      }
    }
    var ops=[], p=0, q=0;
    function push(t, s){
      if(ops.length && ops[ops.length-1].t===t) ops[ops.length-1].s+=s;
      else ops.push({t:t, s:s});
    }
    while(p<n && q<m){
      if(aToks[p]===bToks[q]){ push('=', aToks[p]); p++; q++; }
      else if(dp[p+1][q] >= dp[p][q+1]){ push('-', aToks[p]); p++; }
      else { push('+', bToks[q]); q++; }
    }
    while(p<n){ push('-', aToks[p]); p++; }
    while(q<m){ push('+', bToks[q]); q++; }
    return ops;
  }
  // 渲染 diff 为带 <ins>/<del> 的 HTML
  function renderDiffHtml(before, after){
    var ops=diffTokens(tokenizeForDiff(before), tokenizeForDiff(after));
    var html='';
    for(var i=0;i<ops.length;i++){
      var o=ops[i], esc=escapeHtml(o.s);
      if(o.t==='=') html+=esc;
      else if(o.t==='+') html+='<ins>'+esc+'</ins>';
      else html+='<del>'+esc+'</del>';
    }
    return html;
  }

  function updateInStat(){ $inStat.textContent='输入 '+$in.value.length+' 字符'; }
  $in.addEventListener('input', updateInStat);

  document.getElementById('clear').onclick=function(){ $in.value=''; $out.value=''; $outStat.textContent=''; $badge.innerHTML=''; $badge.className='badge'; clearMsg(); updateInStat(); $stagesCard.style.display='none'; $stages.innerHTML=''; };

  document.getElementById('copy').onclick=function(){
    if(!$out.value) return;
    navigator.clipboard.writeText($out.value).then(function(){
      var b=document.getElementById('copy'); var old=b.textContent; b.textContent='已复制'; setTimeout(function(){b.textContent=old;},1200);
    });
  };

  document.getElementById('run').onclick=function(){
    clearMsg(); $badge.innerHTML=''; $stagesCard.style.display='none'; $stages.innerHTML='';
    $out.value=''; $outStat.textContent='';
    var input=$in.value;
    if(!/\S/.test(input)){ setMsg('err','输入为空。'); return; }

    setRunning(true);

    var useSearch=$useSearch.checked;
    var t0=Date.now();
    var $bar=$progress.querySelector('.bar');
    var $plabel=$progress.querySelector('.label');

    function showResult(rep, baseline){
      setRunning(false);
      $progress.classList.remove('active');
      var elapsed=(Date.now()-t0)/1000;

      $out.value=rep.output;
      $badge.className='badge ok';
      var modeTag=useSearch
        ? (baseline
            ? (rep.bodyLength<baseline.bodyLength
                ? '搜索 · 省'+ (baseline.bodyLength-rep.bodyLength) +'字'
                : '搜索 · ±0')
            : '搜索模式')
        : '';
      $badge.textContent='校验通过'+(modeTag?' ('+modeTag+', '+elapsed.toFixed(1)+'s)':' ('+elapsed.toFixed(1)+'s)');
      var pct=rep.originalLength? Math.round((rep.originalLength-rep.output.length)/rep.originalLength*100):0;
      $inStat.textContent='输入 '+rep.originalLength+' 字符';
      $outStat.textContent='输出 '+rep.output.length+' 字符　压缩比 '+pct+'%';

      if(rep.stages && rep.stages.length){
        $stagesCard.style.display='block';
        var prevLen=rep.originalLength;
        var prevCode=rep.original!=null ? rep.original : input;
        rep.stages.forEach(function(stage){
          var delta=prevLen-stage.len;
          var deltaText=delta>0? '-'+delta : delta<0? '+'+Math.abs(delta) : '±0';
          var deltaClass=delta>0? 'positive' : delta<0? 'negative' : '';
          var changed=(stage.code!==prevCode);
          var hasOptimization=changed;

          var item=document.createElement('div');
          item.className='stage-item'+(hasOptimization?' expandable':'');

          var header=document.createElement('div');
          header.className='stage-header';
          header.innerHTML='<span class="stage-name">'+stage.name+'</span><span><span class="stage-len">'+stage.len+' 字符</span><span class="stage-delta '+deltaClass+'">'+deltaText+'</span>'+(hasOptimization?'<span class="stage-expand"></span>':'')+'</span>';
          item.appendChild(header);

          if(hasOptimization){
            var beforeCode=prevCode, afterCode=stage.code;
            var codeDiv=document.createElement('div');
            codeDiv.className='stage-code';
            var toggle=document.createElement('span');
            toggle.className='diff-toggle active';
            toggle.textContent='diff';
            var showingDiff=true;
            (function(bc,ac,cd,tg){
            function renderMode(){
              if(showingDiff){ cd.innerHTML=renderDiffHtml(bc,ac); tg.textContent='diff'; tg.classList.add('active'); }
              else { cd.textContent=ac; tg.textContent='完整'; tg.classList.remove('active'); }
            }
            tg.onclick=function(ev){ ev.stopPropagation(); showingDiff=!showingDiff; renderMode(); };
            renderMode();
            })(beforeCode,afterCode,codeDiv,toggle);
            header.querySelector('.stage-expand').appendChild(toggle);
            item.appendChild(codeDiv);
            item.onclick=function(){ item.classList.toggle('expanded'); };
          }

          $stages.appendChild(item);
          prevLen=stage.len;
          prevCode=stage.code;
        });

        if(useSearch && baseline){
          var saved=baseline.bodyLength-rep.bodyLength;
          var sItem=document.createElement('div');
          sItem.className='stage-item'+(saved!==0?' expandable':'');
          var sHead=document.createElement('div');
          sHead.className='stage-header';
          var sDelta=saved>0?'-'+saved:saved<0?'+'+Math.abs(saved):'±0';
          var sClass=saved>0?'positive':saved<0?'negative':'';
          sHead.innerHTML='<span class="stage-name">搜索层</span><span><span class="stage-len">'+rep.bodyLength+' 字符</span><span class="stage-delta '+sClass+'">'+sDelta+'</span>'+(saved!==0?'<span class="stage-expand"></span>':'')+'</span>';
          sItem.appendChild(sHead);
          if(saved!==0){
            var sBody=document.createElement('div');
            sBody.className='stage-code';
            sBody.textContent='规则基线 '+baseline.bodyLength+' → 搜索 '+rep.bodyLength+' (省 '+saved+' 字符)';
            sItem.appendChild(sBody);
            sItem.onclick=function(){ sItem.classList.toggle('expanded'); };
          }
          $stages.appendChild(sItem);
        }

      }
    } // end showResult

    function doError(e){
      setRunning(false);
      $progress.classList.remove('active');
      $out.value=''; $badge.className='badge err'; $badge.textContent='已拒绝'; $outStat.textContent='';
      setMsg('err','✗ '+ (e && e.message ? e.message : String(e)) + '\n（输入语法不合规或检测到不等价，已拒绝输出。）');
    }

    if(useSearch){
      $bar.style.width='0%'; $bar.textContent='';
      $plabel.textContent='搜索模式 · 开始…';
      $progress.classList.add('active');
      var searchStepN = 0;
      engine.searchOptimize(input, {
        budget: 10000,
        onProgress: function(p){
          if(p.phase==='baseline'){
            var pct=Math.round(p.current/p.total*50);
            $bar.style.width=pct+'%';
            $bar.textContent=pct+'%';
            $plabel.textContent='基线压缩 · '+(p.stage||'')+' (阈值'+p.threshold+')';
          } else {
            searchStepN++;
            var base=50+Math.round(searchStepN/15*48);
            $bar.style.width=Math.min(base,98)+'%';
            $bar.textContent=Math.min(base,98)+'%';
            $plabel.textContent='搜索优化 · '+(p.step||'')+(p.round?' 第'+p.round+'轮':'');
          }
        },
        _error: doError,
        _done: function(rep){
          showResult(rep, null);
        }
      });
    } else {
      // 普通模式：带进度回调的异步压缩
      $bar.style.width='0%'; $bar.textContent='';
      $plabel.textContent='压缩中…';
      $progress.classList.add('active');
      engine.compress(input, {
        onProgress: function(p){
          var pct=Math.round(p.current/p.total*100);
          $bar.style.width=pct+'%';
          $bar.textContent=pct+'%';
        },
        stageCallback: function(name){
          $plabel.textContent='压缩中 · '+name;
        },
        _error: doError,
        _done: function(rep){
          showResult(rep, null);
        }
      });
    }
  };

  updateInStat();
})();
</script>
</body>
</html>
